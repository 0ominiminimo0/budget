<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기금사업비 예산 산정 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fb;--surface:#ffffff;--border:#e2e5ea;--border2:#c8cdd6;
  --text:#1a1d23;--text2:#5a606b;--text3:#9aa0aa;
  --blue:#2563eb;--blue-bg:#eff4ff;--blue-border:#bfcffd;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#86efac;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fcd34d;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fca5a5;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.header{background:var(--text);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header-logo{font-size:13px;font-weight:700;letter-spacing:.08em;opacity:.9}
.header-title{font-size:15px;font-weight:600}
.header-sub{font-size:12px;color:rgba(255,255,255,.5);margin-left:auto}
.step-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:53px;z-index:99}
.step-btn{padding:12px 16px;font-size:12px;font-weight:600;color:var(--text3);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.step-btn:hover{color:var(--text2)}
.step-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.step-btn.done{color:var(--green)}
.main{max-width:960px;margin:0 auto;padding:24px}
.panel{display:none}.panel.active{display:block}
.section-title{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:600;color:var(--text2)}
.field input,.field select{font-size:13px;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--radius);background:#fff;color:var(--text);width:100%;transition:border .15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue)}
.sc{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center}
.sc .lbl{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500}
.sc .val{font-size:17px;font-weight:700;color:var(--text)}
.sc .sub{font-size:10px;color:var(--text3);margin-top:2px}
.sc.blue{background:var(--blue-bg);border-color:var(--blue-border)}.sc.blue .val{color:var(--blue)}
.sc.green{background:var(--green-bg);border-color:var(--green-border)}.sc.green .val{color:var(--green)}
.sc.amber{background:var(--amber-bg);border-color:var(--amber-border)}.sc.amber .val{color:var(--amber)}
.sc.red{background:var(--red-bg);border-color:var(--red-border)}.sc.red .val{color:var(--red)}
.phdr{display:grid;grid-template-columns:1.5fr 95px 62px 62px 58px 58px 54px 26px;gap:5px;padding:0 10px;margin-bottom:4px}
.phdr span{font-size:10px;font-weight:600;color:var(--text3);text-align:center}
.phdr span:first-child{text-align:left}
.prow{display:grid;grid-template-columns:1.5fr 95px 62px 62px 58px 58px 54px 26px;gap:5px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;margin-bottom:5px}
.prow input,.prow select{font-size:12px;padding:4px 6px;border:1px solid var(--border2);border-radius:5px;background:#fff;color:var(--text);width:100%}
.del-btn{width:24px;height:24px;border:1px solid var(--border2);border-radius:5px;background:#fff;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.del-btn:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.add-btn{font-size:12px;font-weight:600;padding:7px 14px;border:1px dashed var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;margin-top:8px;width:100%;text-align:center}
.add-btn:hover{background:var(--bg);border-color:var(--blue);color:var(--blue)}
.note{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.7;padding:10px;background:var(--bg);border-radius:var(--radius)}
.alloc-row{display:grid;grid-template-columns:86px 1fr 46px 100px;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.alloc-row:last-child{border-bottom:none}
.alloc-name{font-size:13px;font-weight:600}
.alloc-pct{font-size:12px;color:var(--text3)}
input[type=range]{width:100%;accent-color:var(--blue)}
.hint-box{font-size:11px;color:var(--text2);background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius);padding:10px 12px;margin-top:10px;line-height:1.7}
.pb-wrap{height:5px;background:var(--border);border-radius:3px;margin-bottom:10px;overflow:hidden}
.pb{height:100%;border-radius:3px;transition:width .2s;background:var(--blue)}
.pb.ok{background:var(--green)}.pb.over{background:var(--red)}
.item-row{display:grid;grid-template-columns:22px 1fr 58px 105px;gap:8px;align-items:center;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:4px;cursor:pointer;transition:all .1s}
.item-row:hover{border-color:var(--border2)}
.item-row.on{background:var(--blue-bg);border-color:var(--blue-border)}
.item-row.absorb{background:var(--amber-bg);border-color:var(--amber-border)}
.iname{font-size:12px;font-weight:600;color:var(--text)}
.idesc{font-size:10px;color:var(--text3);margin-top:1px}
.iamt{font-size:13px;font-weight:700;text-align:right;color:var(--text)}
.item-row.on .iamt{color:var(--blue)}
.item-row.absorb .iamt{color:var(--amber)}
.qinput{font-size:12px;padding:3px 6px;width:48px;border:1px solid var(--border2);border-radius:5px;background:#fff;color:var(--text);text-align:center}
.bimok-sect{margin-bottom:18px}
.bimok-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.bimok-name{font-size:13px;font-weight:700}
.bimok-meta{font-size:12px;color:var(--text2)}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-left:4px}
.tag.auto{background:var(--green-bg);color:var(--green)}
.tag.absorb{background:var(--amber-bg);color:var(--amber)}
.tag.ex{background:var(--green-bg);color:var(--green)}
.tag.new{background:var(--blue-bg);color:var(--blue)}
.tag.cash{background:var(--blue-bg);color:var(--blue)}
.tag.goods{background:var(--green-bg);color:var(--green)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
.btn{font-size:13px;font-weight:600;padding:9px 20px;border-radius:var(--radius);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-outline{border:1px solid var(--border2);background:#fff;color:var(--text2)}
.btn-outline:hover{border-color:var(--text2)}
.btn-primary{border:none;background:var(--blue);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-success{border:1px solid var(--green-border);background:var(--green-bg);color:var(--green)}
.btn-success:hover{background:#dcfce7}
.btn-excel{border:1px solid #1d6f42;background:#1d6f42;color:#fff}
.btn-excel:hover{background:#155e36}
.btn-print{border:1px solid var(--border2);background:#fff;color:var(--text2)}
.btn-print:hover{background:var(--bg)}
.ftbl{width:100%;border-collapse:collapse;font-size:12px}
.ftbl th{font-size:11px;font-weight:600;color:var(--text2);padding:7px 8px;border-bottom:2px solid var(--border2);text-align:right;background:var(--bg)}
.ftbl th:first-child,.ftbl th:nth-child(2){text-align:left}
.ftbl td{padding:7px 8px;border-bottom:1px solid var(--border);text-align:right;vertical-align:top}
.ftbl td:first-child,.ftbl td:nth-child(2){text-align:left}
.ftbl tr.brow td{background:var(--bg);font-weight:600;font-size:12px}
.ftbl tr.trow td{font-weight:700;background:var(--text);color:#fff}
.tab-row{display:flex;gap:6px;margin-bottom:12px}
.tab{font-size:12px;font-weight:600;padding:5px 16px;border:1px solid var(--border2);border-radius:20px;background:#fff;color:var(--text2);cursor:pointer}
.tab.on{background:var(--text);color:#fff;border-color:var(--text)}
.alert{border-radius:var(--radius);padding:11px 14px;margin-bottom:14px;font-size:12px;font-weight:500;border:1px solid}
.alert.ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.alert.warn{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
@media print{.header,.step-nav,.nav-row{display:none!important}.panel{display:block!important}.main{padding:0}}
</style>
</head>
<body>
<div class="header">
  <span class="header-logo">BUDGET</span>
  <span class="header-title">기금사업비 예산 산정 시스템</span>
  <span class="header-sub">과기부훈령 제297호 기준 · AI/IT 기업용</span>
</div>
<div class="step-nav">
  <button class="step-btn active" onclick="go(0)">① 예산 설정</button>
  <button class="step-btn" onclick="go(1)">② 인건비 산정</button>
  <button class="step-btn" onclick="go(2)">③ 비목 가이드</button>
  <button class="step-btn" onclick="go(3)">④ 항목 선택</button>
  <button class="step-btn" onclick="go(4)">⑤ 최종 출력</button>
</div>
<div class="main">

<!-- ① -->
<div class="panel active" id="p0">
  <div class="section-title">총 사업비 입력</div>
  <div class="card">
    <div class="g3" style="margin-bottom:14px">
      <div class="field"><label>정부출연금 (천원)</label><input type="number" id="govAmt" value="625000" step="1000" oninput="s0()"></div>
      <div class="field"><label>민간부담금 현금 (천원)</label><input type="number" id="privCash" value="20833" step="1000" oninput="s0()"></div>
      <div class="field"><label>민간부담금 현물 (천원)</label><input type="number" id="privGoods" value="187500" step="1000" oninput="s0()"></div>
    </div>
    <div class="g4" id="s0c"></div>
  </div>
  <div class="section-title">사업 기간</div>
  <div class="card">
    <div class="g2" style="gap:12px">
      <div class="field"><label>시작연도</label><select id="startYear"><option value="2025">2025</option><option value="2026" selected>2026</option><option value="2027">2027</option></select></div>
      <div class="field"><label>사업 기간</label><select id="duration"><option value="1">1년</option><option value="2" selected>2년</option><option value="3">3년</option></select></div>
      <div class="field"><label>1차년도 시작월</label><select id="startMonth"><option value="1">1월</option><option value="2">2월</option><option value="3">3월</option><option value="4" selected>4월</option><option value="5">5월</option><option value="6">6월</option></select></div>
      <div class="field"><label>계산방식</label><select id="calcMethod"><option value="rule" selected>공고 예시 방식 (시작월 제외)</option><option value="exact">정확한 달력 개월수</option></select></div>
    </div>
    <p class="note" id="pNote" style="margin-top:12px"></p>
  </div>
  <div class="nav-row"><span></span><button class="btn btn-primary" onclick="go(1)">다음 → 인건비 산정</button></div>
</div>

<!-- ② -->
<div class="panel" id="p1">
  <div class="section-title">참여인력 입력</div>
  <div class="card">
    <div class="phdr"><span>성명 / 직위</span><span>연봉(천원)</span><span>1차 참여율</span><span>2차 참여율</span><span>구분</span><span>현금/현물</span><span>비고</span><span></span></div>
    <div id="pList"></div>
    <button class="add-btn" onclick="addP()">+ 인력 추가</button>
    <p class="note">※ 신규인력 → 현금만 가능 &nbsp;|&nbsp; 현물 → 협약일 현재 재직 기존인력만 &nbsp;|&nbsp; 1인 현물·현금 동시 불가 &nbsp;|&nbsp; 신규인력 퇴직금 편성 불가<br>※ 산정식: 연봉 ÷ 12 × 참여개월 × 참여율 (천원 미만 절사)</p>
  </div>
  <div id="laborOut"></div>
  <div class="nav-row"><button class="btn btn-outline" onclick="go(0)">← 이전</button><button class="btn btn-primary" onclick="calcLabor();go(2)">계산 후 다음 →</button></div>
</div>

<!-- ③ -->
<div class="panel" id="p2">
  <div class="card" id="p2sum"></div>
  <div class="section-title">비목별 배분 가이드 &nbsp;<span style="font-weight:500;color:var(--amber);font-size:11px;text-transform:none">※ 참고용 — 합계가 100%가 아니어도 됩니다</span></div>
  <div class="card"><div id="allocSl"></div><div class="hint-box" id="allocHint"></div></div>
  <div class="nav-row"><button class="btn btn-outline" onclick="go(1)">← 이전</button><button class="btn btn-primary" onclick="runStep4()">항목 자동 선택 →</button></div>
</div>

<!-- ④ -->
<div class="panel" id="p3">
  <div id="p3top"></div>
  <div id="p3items"></div>
  <div class="nav-row"><button class="btn btn-outline" onclick="go(2)">← 이전</button><button class="btn btn-primary" onclick="go(4);buildFinal()">최종 출력 →</button></div>
</div>

<!-- ⑤ -->
<div class="panel" id="p4">
  <div id="finalOut"></div>
  <div class="nav-row">
    <button class="btn btn-outline" onclick="go(3)">← 수정</button>
    <div class="btn-group">
      <button class="btn btn-excel" onclick="downloadExcel()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        엑셀 다운로드
      </button>
      <button class="btn btn-print" onclick="window.print()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>
        인쇄 / PDF
      </button>
    </div>
  </div>
</div>

</div>

<script>

function calcLabor(){S.dur=+document.getElementById('duration').value;S.sy=+document.getElementById('startYear').value;S.sm=+document.getElementById('startMonth').value;S.method=document.getElementById('calcMethod').value;let years=[],tc=0,tg=0;for(let yi=0;yi<S.dur;yi++){const m=getM(yi),yr=S.sy+yi;const rows=S.people.map(p=>{const r=yi===0?p.r1:p.r2;if(!r)return{p,r:0,m,amt:0};return{p,r,m,amt:Math.floor(p.sal/12*m*r/100)};});const yc=rows.filter(x=>x.p.ct==='현금').reduce((a,x)=>a+x.amt,0);const yg=rows.filter(x=>x.p.ct==='현물').reduce((a,x)=>a+x.amt,0);years.push({yr,m,rows,totCash:yc,totGoods:yg,tot:yc+yg});tc+=yc;tg+=yg;}S.labor={years,totCash:tc,totGoods:tg,totTotal:tc+tg};let h=`<div class="card"><div class="card-title">인건비 산정 결과</div><div class="g3" style="margin-bottom:12px"><div class="sc"><div class="lbl">출연금 (현금)</div><div class="val">${fmt(tc)}</div><div class="sub">천원</div></div><div class="sc"><div class="lbl">민간 (현물)</div><div class="val">${fmt(tg)}</div><div class="sub">천원</div></div><div class="sc blue"><div class="lbl">인건비 합계</div><div class="val">${fmt(tc+tg)}</div><div class="sub">천원</div></div></div>`;years.forEach(y=>{h+=`<div style="font-size:12px;color:var(--text2);margin:10px 0 6px;font-weight:600">${y.yr}년 (${y.m}개월 적용)</div><table class="ftbl"><thead><tr><th>성명/직위</th><th>구분</th><th>연봉</th><th>참여율</th><th>산출식</th><th>인건비</th><th>현금/현물</th></tr></thead><tbody>`;y.rows.forEach(({p,r,m,amt})=>{if(!r){h+=`<tr><td>${p.name}</td><td></td><td colspan="4" style="text-align:center;color:var(--text3)">미참여</td><td></td></tr>`;return;}h+=`<tr><td style="font-weight:600">${p.name}</td><td><span class="tag ${p.type==='existing'?'ex':'new'}">${p.type==='existing'?'기존':'신규'}</span></td><td>${fmt(p.sal)}</td><td>${r}%</td><td style="font-size:11px;color:var(--text2)">${fmt(p.sal)}÷12×${m}×${r}%</td><td><b>${fmt(amt)}</b></td><td><span class="tag ${p.ct==='현금'?'cash':'goods'}">${p.ct}</span></td></tr>`;});h+=`<tr class="brow"><td colspan="5">합계</td><td><b>${fmt(y.tot)}</b></td><td></td></tr></tbody></table>`;});document.getElementById('laborOut').innerHTML=h+'</div>';}

function runStep4(){go(3);autoCompose();recalcFinal();renderComposed();}
function autoCompose(){const tm=getTM();S.composed={};BIMOKS.forEach(bm=>{const hint=Math.floor((S.gov+S.pC+S.pG-S.labor.totTotal)*S.alloc[bm]/100);S.composed[bm]=greedyFit(DB[bm]||[],hint,tm);});}
function greedyFit(items,hint,tm){let result=[],running=0;items.filter(it=>it.sp==='audit').forEach(it=>{const a=iAmt(it,1,tm);result.push({item:it,qty:1,rawAmt:a,finalAmt:a,on:true,auto:true,absorb:false});running+=a;});const pool=[...items.filter(x=>!x.sp)].sort((a,b)=>iAmt(b,b.qty,tm)-iAmt(a,a.qty,tm));for(const it of pool){if(running>=hint)break;const base1=iAmt(it,1,tm);if(!base1)continue;let useQ=it.qty;if(running+base1*useQ>hint*1.2)useQ=Math.max(it.min,Math.min(it.max,Math.floor((hint-running)/base1)));useQ=Math.max(1,Math.min(useQ,it.max));const a=base1*useQ;result.push({item:it,qty:useQ,rawAmt:a,finalAmt:a,on:true,auto:true,absorb:false});running+=a;}items.filter(it=>!it.sp&&!result.find(r=>r.item.id===it.id)).forEach(it=>{const a=iAmt(it,it.qty,tm);result.push({item:it,qty:it.qty,rawAmt:a,finalAmt:a,on:false,auto:false,absorb:false});});return result;}
function recalcFinal(){const gt=S.gov+S.pC+S.pG,labor=S.labor.totTotal,target=gt-labor;BIMOKS.forEach(bm=>(S.composed[bm]||[]).forEach(r=>{r.finalAmt=r.rawAmt;r.absorb=false;}));let rawOn=0;BIMOKS.forEach(bm=>(S.composed[bm]||[]).filter(r=>r.on).forEach(r=>rawOn+=r.rawAmt));const diff=target-rawOn;if(Math.abs(diff)<1)return;const priority=['연구용역비','운영비','유형자산','여비','업무추진비'];let done=false;for(const bm of priority){if(done)break;const vr=(S.composed[bm]||[]).filter(r=>r.on&&!r.item.sp&&!r.item.pm).sort((a,b)=>b.rawAmt-a.rawAmt);for(const row of vr){const na=row.rawAmt+diff;if(na>0){row.finalAmt=na;row.absorb=true;done=true;break;}}}}
function toggleItem(bm,id){const row=(S.composed[bm]||[]).find(r=>r.item.id===id);if(row&&!row.item.sp)row.on=!row.on;recalcFinal();renderComposed();}
function updateQty(bm,id,qty){const tm=getTM();const row=(S.composed[bm]||[]).find(r=>r.item.id===id);if(row){row.qty=Math.max(row.item.min,Math.min(row.item.max,qty));row.rawAmt=iAmt(row.item,row.qty,tm);}recalcFinal();renderComposed();}
function renderComposed(){const gt=S.gov+S.pC+S.pG,labor=S.labor.totTotal,tm=getTM(),rem=gt-labor;let bmT={};BIMOKS.forEach(bm=>{bmT[bm]=(S.composed[bm]||[]).filter(r=>r.on).reduce((a,r)=>a+r.finalAmt,0);});const bmSum=Object.values(bmT).reduce((a,v)=>a+v,0),grand=labor+bmSum,diff=grand-gt,ok=Math.abs(diff)<10;document.getElementById('p3top').innerHTML=`<div class="g4" style="margin-bottom:14px"><div class="sc blue"><div class="lbl">총 사업비 (목표)</div><div class="val">${fmt(gt)}</div><div class="sub">천원</div></div><div class="sc"><div class="lbl">인건비</div><div class="val">${fmt(labor)}</div><div class="sub">천원</div></div><div class="sc"><div class="lbl">비목 합산</div><div class="val">${fmt(bmSum)}</div><div class="sub">천원</div></div><div class="sc ${ok?'green':Math.abs(diff)<5000?'amber':'red'}"><div class="lbl">전체 합계 / 차이</div><div class="val">${fmt(grand)}</div><div class="sub">${ok?'✓ 정확히 일치':(diff>0?'+':'')+fmt(diff)+'천원'}</div></div></div>`;let h='';BIMOKS.forEach(bm=>{const hint=Math.floor(rem*S.alloc[bm]/100),selSum=bmT[bm],rows=S.composed[bm]||[];const pct=hint>0?Math.min(selSum/hint*100,100):0;h+=`<div class="bimok-sect"><div class="bimok-hdr"><span class="bimok-name">${bm}</span><span class="bimok-meta"><b>${fmt(selSum)}</b>천원 <span style="color:var(--text3)">/ 가이드 ≈${fmt(hint)}천원</span></span></div><div class="pb-wrap"><div class="pb${pct>=90&&pct<=115?' ok':pct>130?' over':''}" style="width:${Math.min(pct,100)}%"></div></div>`;[...rows.filter(r=>r.on),...rows.filter(r=>!r.on)].forEach(row=>{const it=row.item,isF=it.pm||it.sp,isA=row.absorb,cls=row.on?(isA?'item-row absorb':'item-row on'):'item-row';h+=`<div class="${cls}" onclick="toggleItem('${bm}','${it.id}')"><span style="font-size:14px;color:${row.on?(isA?'var(--amber)':'var(--blue)'):'var(--text3)'}">${row.on?'●':'○'}</span><div><span class="iname">${it.n}</span>${row.auto&&row.on&&!isA?'<span class="tag auto">자동</span>':''}${isA?'<span class="tag absorb">차액흡수</span>':''}<div class="idesc">[${it.cat}] ${it.desc}${it.pm?` × ${tm}개월`:''}</div></div><div onclick="event.stopPropagation()">${isF?`<span style="font-size:11px;color:var(--text3)">${it.pm?tm+'개월':'고정'}</span>`:`<input class="qinput" type="number" value="${row.qty}" min="${it.min}" max="${it.max}" oninput="updateQty('${bm}','${it.id}',+this.value)">`}</div><div class="iamt">${isA&&row.rawAmt!==row.finalAmt?`<div style="font-size:10px;text-decoration:line-through;color:var(--text3)">${fmt(row.rawAmt)}</div>`:''}${fmt(row.finalAmt)}천원</div></div>`;});h+=`</div>`;});document.getElementById('p3items').innerHTML=h;}
function buildFinal(){const gt=S.gov+S.pC+S.pG,lr=S.labor,d=S.dur,sy=S.sy,tm=getTM();const bmd={인건비:{total:lr.totTotal,A:lr.totCash,cash:0,goods:lr.totGoods}};BIMOKS.forEach(bm=>{const tot=(S.composed[bm]||[]).filter(r=>r.on).reduce((a,r)=>a+r.finalAmt,0);bmd[bm]={total:tot,A:Math.floor(tot*0.75),cash:Math.floor(tot*0.05),goods:tot-Math.floor(tot*0.75)-Math.floor(tot*0.05)};});const gT=['인건비',...BIMOKS].reduce((a,bm)=>a+bmd[bm].total,0);const gA=['인건비',...BIMOKS].reduce((a,bm)=>a+bmd[bm].A,0);const gC=['인건비',...BIMOKS].reduce((a,bm)=>a+(bmd[bm].cash||0),0);const gG=['인건비',...BIMOKS].reduce((a,bm)=>a+bmd[bm].goods,0);const diff=gT-gt,ok=Math.abs(diff)<10;let h=`<div class="g4" style="margin-bottom:14px"><div class="sc blue"><div class="lbl">입력 총 사업비</div><div class="val">${fmt(gt)}</div><div class="sub">천원</div></div><div class="sc ${ok?'green':'amber'}"><div class="lbl">산출 합산액</div><div class="val">${fmt(gT)}</div><div class="sub">천원</div></div><div class="sc ${ok?'green':'amber'}"><div class="lbl">차이</div><div class="val">${ok?'0':(diff>0?'+':'')+fmt(diff)}</div><div class="sub">천원</div></div><div class="sc"><div class="lbl">인건비 비중</div><div class="val">${(lr.totTotal/gT*100).toFixed(1)}%</div><div class="sub">전체 대비</div></div></div><div class="alert ${ok?'ok':'warn'}">${ok?'✓ 총 사업비와 합산액이 완벽히 일치합니다.':'⚡ 차이 '+fmt(Math.abs(diff))+'천원 — ④ 항목선택에서 조정 후 다시 출력해주세요.'}</div>`;
  h+=`<div class="card"><div class="card-title">총괄표 (단위: 천원)</div><table class="ftbl"><thead><tr><th>비목</th><th>정부출연금(A)</th><th>민간현금</th><th>민간현물</th><th>소계(B)</th><th>합계(A+B)</th><th>구성비(%)</th></tr></thead><tbody>`;['인건비',...BIMOKS].forEach(bm=>{const t=bmd[bm],pct=gT>0?(t.total/gT*100).toFixed(1):'0.0';h+=`<tr><td style="font-weight:600">${bm}</td><td>${fmt(t.A)}</td><td>${fmt(t.cash||0)}</td><td>${fmt(t.goods)}</td><td>${fmt((t.cash||0)+t.goods)}</td><td>${fmt(t.total)}</td><td>${pct}%</td></tr>`;});h+=`<tr class="trow"><td>합  계</td><td>${fmt(gA)}</td><td>${fmt(gC)}</td><td>${fmt(gG)}</td><td>${fmt(gC+gG)}</td><td>${fmt(gT)}</td><td>100%</td></tr></tbody></table></div>`;
  h+=`<div class="card"><div class="card-title">인건비 세부 (단위: 천원)</div>`;if(d>=2){h+=`<div class="tab-row">`;for(let i=0;i<d;i++)h+=`<button class="tab${i===0?' on':''}" onclick="swT(${i},${d},this.closest('.card'))">${sy+i}년</button>`;h+=`</div>`;}lr.years.forEach((y,yi)=>{h+=`<div class="ytab" style="display:${yi===0?'block':'none'}"><table class="ftbl"><thead><tr><th>성명/직위</th><th>구분</th><th>연봉</th><th>참여율</th><th>참여월</th><th>산출식</th><th>인건비</th><th>현금/현물</th><th>비고</th></tr></thead><tbody>`;y.rows.forEach(({p,r,m,amt})=>{if(!r){h+=`<tr><td>${p.name}</td><td></td><td colspan="6" style="text-align:center;color:var(--text3)">미참여</td><td></td></tr>`;return;}h+=`<tr><td style="font-weight:600">${p.name}</td><td><span class="tag ${p.type==='existing'?'ex':'new'}">${p.type==='existing'?'기존':'신규'}</span></td><td>${fmt(p.sal)}</td><td>${r}%</td><td>${m}개월</td><td style="font-size:11px;color:var(--text2)">${fmt(p.sal)}÷12×${m}×${r}%</td><td><b>${fmt(amt)}</b></td><td><span class="tag ${p.ct==='현금'?'cash':'goods'}">${p.ct}</span></td><td style="font-size:11px;color:var(--text3)">${p.note}</td></tr>`;});h+=`<tr class="brow"><td colspan="6">합계</td><td><b>${fmt(y.tot)}</b></td><td></td><td></td></tr></tbody></table></div>`;});h+=`</div>`;
  h+=`<div class="card"><div class="card-title">세부 항목 산출내역 (단위: 천원)</div><table class="ftbl"><thead><tr><th>비목</th><th>항목명 [세목]</th><th>산출근거</th><th>수량</th><th>금액</th><th>비고</th></tr></thead><tbody>`;BIMOKS.forEach(bm=>{const oR=(S.composed[bm]||[]).filter(r=>r.on);if(!oR.length)return;let bs=0;oR.forEach(r=>{const it=r.item,qL=it.pm?`${tm}개월`:it.sp?'1식':`${r.qty}`;bs+=r.finalAmt;h+=`<tr><td style="font-size:11px;color:var(--text2)">${bm}</td><td>${it.n}${r.absorb?'<span class="tag absorb" style="margin-left:4px">차액흡수</span>':''}<br><span style="font-size:10px;color:var(--text3)">[${it.cat}]</span></td><td style="font-size:11px">${it.desc}${it.pm?` × ${tm}개월`:''}</td><td>${qL}</td><td><b>${fmt(r.finalAmt)}</b>${r.absorb&&r.rawAmt!==r.finalAmt?`<br><span style="font-size:10px;text-decoration:line-through;color:var(--text3)">${fmt(r.rawAmt)}</span>`:''}</td><td style="font-size:11px;color:var(--text3)">${r.absorb?'차액흡수':'기준가'}</td></tr>`;});h+=`<tr class="brow"><td colspan="4">${bm} 소계</td><td><b>${fmt(bs)}</b></td><td></td></tr>`;});h+=`</tbody></table></div>`;
  document.getElementById('finalOut').innerHTML=h;
}
function swT(idx,d,c){c.querySelectorAll('.ytab').forEach((el,i)=>el.style.display=i===idx?'block':'none');c.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',i===idx));}

// ★ 엑셀 다운로드 함수
function downloadExcel(){
  if(typeof XLSX==='undefined'){alert('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');return;}
  const wb=XLSX.utils.book_new();
  const tm=getTM();
  const gt=S.gov+S.pC+S.pG;
  const lr=S.labor;

  // 비목별 최종 금액
  const bmd={인건비:{total:lr.totTotal,A:lr.totCash,cash:0,goods:lr.totGoods}};
  BIMOKS.forEach(bm=>{const tot=(S.composed[bm]||[]).filter(r=>r.on).reduce((a,r)=>a+r.finalAmt,0);bmd[bm]={total:tot,A:Math.floor(tot*0.75),cash:Math.floor(tot*0.05),goods:tot-Math.floor(tot*0.75)-Math.floor(tot*0.05)};});
  const gT=['인건비',...BIMOKS].reduce((a,bm)=>a+bmd[bm].total,0);
  const gA=['인건비',...BIMOKS].reduce((a,bm)=>a+bmd[bm].A,0);
  const gC=['인건비',...BIMOKS].reduce((a,bm)=>a+(bmd[bm].cash||0),0);
  const gG=['인건비',...BIMOKS].reduce((a,bm)=>a+bmd[bm].goods,0);

  // ── 시트1: 총괄표 ──
  const s1=[
    ['사업비 총괄표 (단위: 천원)'],
    [],
    ['비목','정부출연금(A)','민간현금','민간현물','소계(B)','합계(A+B)','구성비(%)'],
  ];
  ['인건비',...BIMOKS].forEach(bm=>{
    const t=bmd[bm];
    s1.push([bm, n(t.A), n(t.cash||0), n(t.goods), n((t.cash||0)+t.goods), n(t.total), gT>0?+(t.total/gT*100).toFixed(1):0]);
  });
  s1.push(['합  계', n(gA), n(gC), n(gG), n(gC+gG), n(gT), 100]);
  s1.push([]);
  s1.push(['입력 총 사업비', n(gt), '', '', '', '', '']);
  s1.push(['산출 합산액', n(gT), '', '', '', '', '']);
  s1.push(['차이', n(gT-gt), '', '', '', '', '']);
  const ws1=XLSX.utils.aoa_to_sheet(s1);
  ws1['!cols']=[{wch:14},{wch:14},{wch:12},{wch:12},{wch:12},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws1,'①총괄표');

  // ── 시트2: 인건비 세부 ──
  const s2=[['인건비 세부 산출내역 (단위: 천원)'],[]];
  lr.years.forEach(y=>{
    s2.push([`${y.yr}년 (${y.m}개월 적용)`]);
    s2.push(['성명/직위','구분','연봉(천원)','참여율(%)','참여월','산출식','인건비(천원)','현금/현물','비고']);
    y.rows.forEach(({p,r,m,amt})=>{
      if(!r){s2.push([p.name,'','','','','미참여','',p.ct,p.note]);return;}
      s2.push([p.name, p.type==='existing'?'기존':'신규', n(p.sal), r, m, `${p.sal}÷12×${m}×${r}%`, n(amt), p.ct, p.note]);
    });
    s2.push(['합계','','','','','', n(y.tot),'','']);
    s2.push([]);
  });
  // 전체 인건비 합계
  s2.push(['전체 인건비 합계','','','','','', n(lr.totTotal),'','']);
  s2.push(['  현금(출연금)','','','','','', n(lr.totCash),'','']);
  s2.push(['  현물(민간부담금)','','','','','', n(lr.totGoods),'','']);
  const ws2=XLSX.utils.aoa_to_sheet(s2);
  ws2['!cols']=[{wch:18},{wch:8},{wch:12},{wch:10},{wch:8},{wch:22},{wch:14},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws2,'②인건비세부');

  // ── 시트3: 세부 항목 ──
  const s3=[['세부 항목 산출내역 (단위: 천원)'],[]];
  s3.push(['비목','세목','항목명','산출근거','수량','단가(천원)','금액(천원)','비고']);
  BIMOKS.forEach(bm=>{
    const oR=(S.composed[bm]||[]).filter(r=>r.on);
    if(!oR.length)return;
    let bSum=0;
    oR.forEach(r=>{
      const it=r.item;
      const qL=it.pm?`${tm}개월`:it.sp?'1식':`${r.qty}`;
      const unitA=it.pm?Math.floor(r.finalAmt/tm):it.sp?r.finalAmt:Math.floor(r.finalAmt/(r.qty||1));
      bSum+=r.finalAmt;
      s3.push([bm, it.cat, it.n, it.desc+(it.pm?` × ${tm}개월`:''), qL, n(unitA), n(r.finalAmt), r.absorb?'차액흡수':'기준가']);
    });
    s3.push([`${bm} 소계`,'','','','','', n(bSum),'']);
    s3.push([]);
  });
  const ws3=XLSX.utils.aoa_to_sheet(s3);
  ws3['!cols']=[{wch:12},{wch:14},{wch:24},{wch:28},{wch:10},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws3,'③세부산출내역');

  // 다운로드
  const today=new Date();
  const dateStr=`${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb,`기금사업비_예산산출_${dateStr}.xlsx`);
}

function go(n){document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===n));document.querySelectorAll('.step-btn').forEach((b,i)=>{b.classList.remove('active','done');if(i===n)b.classList.add('active');else if(i<n)b.classList.add('done');});if(n===1)renderPList();if(n===2){s0();calcLabor();buildAllocPanel();}}
s0();renderPList();calcLabor();buildAllocPanel();
</script>
